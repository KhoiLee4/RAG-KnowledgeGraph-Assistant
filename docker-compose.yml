services:
  neo4j:
    image: neo4j:5.18
    container_name: neo4j_kb
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/yourpassword
    volumes:
      - neo4j_data:/data

  chromadb:
    image: chromadb/chroma:latest
    container_name: chroma_kb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma

volumes:
  neo4j_data:
  chroma_data:
